  <div class="forum-container">
    <div class="forum-header">
      <h1>General Discussion</h1>
      <p>Talk about anything and everything.</p>
    </div>

    <div id="new-post-section" class="new-post-section" style="display:none">
      <h3>New Post</h3>
      <form id="post-form" enctype="multipart/form-data">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" maxlength="120" placeholder="Post title..." required />
        </div>
        <div class="form-group">
          <label for="content">Content</label>
          <textarea id="content" name="content" rows="5" placeholder="Write your post..." required></textarea>
        </div>
        <div class="form-group">
          <label for="image">Image (optional)</label>
          <input type="file" id="image" name="image" accept="image/*" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-post">Post</button>
          <button type="button" class="btn-cancel" id="cancel-post">Cancel</button>
        </div>
        <p class="error-msg" id="post-error"></p>
      </form>
    </div>

    <div class="forum-toolbar">
      <span id="post-count" class="post-count"></span>
      <button id="new-post-btn" class="btn-new-post" style="display:none">+ New Post</button>
      <a href="../login.html" id="login-prompt" class="login-prompt" style="display:none">Log in to post</a>
    </div>

    <div id="posts-list" class="posts-list">
      <p class="loading-msg">Loading posts...</p>
    </div>
  </div>

  <script>
    const FORUM_ID = 1;
